<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading... — MathDen</title>
  <meta name="description" content="Play free online games at MathDen.">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/game.css">
</head>
<body>

  <!-- HEADER (same as homepage) -->
  <header>
    <div class="header-inner">
      <a href="/" class="logo">
        <span class="logo-emoji">🦁</span>
        <span>MathDen</span>
      </a>
      <div class="search-bar">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.3-4.3"></path>
        </svg>
        <input type="text" id="searchInput" placeholder="Search games...">
      </div>
    </div>
  </header>

  <!-- MAIN GAME AREA -->
  <main class="game-page">
    
    <!-- Game title bar -->
    <div class="game-header">
      <a href="/" class="back-link">← Back to games</a>
      <h1 id="gameTitle">Loading...</h1>
      <button class="fullscreen-btn" id="fullscreenBtn" title="Fullscreen">⛶</button>
    </div>

    <!-- Game iframe container -->
    <div class="game-frame-container" id="frameContainer">
      <div class="game-loading" id="gameLoading">
        <div class="spinner"></div>
        <p>Loading game...</p>
      </div>
      <iframe id="gameFrame" allowfullscreen></iframe>
    </div>

    <!-- More Games Section -->
    <section class="more-games-section">
      <h2 class="section-title">🎮 More Games</h2>
      <div class="game-grid" id="moreGamesGrid"></div>
    </section>

  </main>
<!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <p>© 2026 MathDen. Free games for curious minds.</p>
      <nav class="footer-links">
        <a href="/about.html">About</a>
        <a href="/privacy.html">Privacy</a>
        <a href="/terms.html">Terms</a>
        <a href="mailto:hello@mathden.com">Contact</a>
      </nav>
    </div>
  </footer>
  <!-- SCRIPTS -->
  <script src="assets/js/games.js"></script>
  <script src="assets/js/game-page.js"></script>

</body>
</html>
