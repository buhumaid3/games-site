<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MathDen — Free Online Games</title>
  <meta name="description" content="Play free online games at MathDen. Action, puzzle, racing, and more — no download required.">
  <meta property="og:title" content="MathDen — Free Online Games">
  <meta property="og:description" content="Play free online games at MathDen. Action, puzzle, racing, and more.">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <a href="/" class="logo">
        <span class="logo-emoji">🦁</span>
        <span>MathDen</span>
      </a>
      <div class="search-bar">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.3-4.3"></path>
        </svg>
        <input type="text" id="searchInput" placeholder="Search games...">
      </div>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main>
    <h2 class="section-title">🔥 All Games</h2>
    <div class="game-grid" id="gameGrid">
      <!-- Cards will be rendered by JS -->
    </div>
    <div class="empty-state" id="emptyState" style="display: none;">
      No games match your search. Try a different keyword.
    </div>
  </main>

  <!-- SCRIPTS -->
  <script src="assets/js/games.js"></script>
  <script>
    const grid = document.getElementById("gameGrid");
    const searchInput = document.getElementById("searchInput");
    const emptyState = document.getElementById("emptyState");

    function renderGames(gameList) {
      grid.innerHTML = "";
      if (gameList.length === 0) {
        emptyState.style.display = "block";
        return;
      }
      emptyState.style.display = "none";
      gameList.forEach(game => {
        const card = document.createElement("a");
        card.href = `game.html?id=${game.id}`;
        card.className = "game-card";
        card.innerHTML = `
          <img class="game-card-thumb" src="${game.thumbnail}" alt="${game.title}" loading="lazy">
          <div class="game-card-body">
            <div class="game-card-title">${game.title}</div>
            <div class="game-card-tag">${game.category}</div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    searchInput.addEventListener("input", (e) => {
      const q = e.target.value.trim().toLowerCase();
      const filtered = GAMES.filter(g =>
        g.title.toLowerCase().includes(q) ||
        g.category.toLowerCase().includes(q)
      );
      renderGames(filtered);
    });

    // Check URL for incoming search query (from game page)
const urlParams = new URLSearchParams(window.location.search);
const incomingSearch = urlParams.get("search");
if (incomingSearch) {
  searchInput.value = incomingSearch;
  const filtered = GAMES.filter(g =>
    g.title.toLowerCase().includes(incomingSearch.toLowerCase()) ||
    g.category.toLowerCase().includes(incomingSearch.toLowerCase())
  );
  renderGames(filtered);
} else {
  renderGames(GAMES);
}
  </script>

</body>
</html>
