<script>
  const grid = document.getElementById("gameGrid");
  const searchInput = document.getElementById("searchInput");
  const emptyState = document.getElementById("emptyState");
  const categoryTabs = document.getElementById("categoryTabs");
  const gridTitle = document.getElementById("gridTitle");
  const recentlyPlayedSection = document.getElementById("recentlyPlayedSection");
  const recentlyPlayedGrid = document.getElementById("recentlyPlayedGrid");

  let activeCategory = "All";
  let searchQuery = "";

  // Build a single game card element
  function buildCard(game) {
    const card = document.createElement("a");
    card.href = `game.html?id=${game.id}`;
    card.className = "game-card";
    card.innerHTML = `
      <img class="game-card-thumb" src="${game.thumbnail}" alt="${game.title}" loading="lazy">
      <div class="game-card-body">
        <div class="game-card-title">${game.title}</div>
        <div class="game-card-tag">${game.category}</div>
      </div>
    `;
    return card;
  }

  // Render category filter tabs
  function renderCategoryTabs() {
    categoryTabs.innerHTML = "";
    CATEGORIES.forEach(cat => {
      const btn = document.createElement("button");
      btn.className = "category-tab" + (cat === activeCategory ? " active" : "");
      btn.textContent = cat;
     btn.addEventListener("click", () => {
  activeCategory = cat;
  searchInput.value = "";
  searchQuery = "";
  renderCategoryTabs();
  gridTitle.textContent = cat === "All" ? "🔥 All Games" : `🔥 ${cat}`;
  applyFilters();
  window.scrollTo({ top: 0, behavior: "smooth" });

  // Track category click
  if (typeof posthog !== 'undefined') {
    posthog.capture('category_clicked', {
      category: cat,
    });
  }
});
      categoryTabs.appendChild(btn);
    });
  }

  // Render the filtered game grid
  function renderGames(gameList) {
    grid.innerHTML = "";
    if (gameList.length === 0) {
      emptyState.style.display = "block";
      return;
    }
    emptyState.style.display = "none";
    gameList.forEach(g => grid.appendChild(buildCard(g)));
  }

  // Combine category + search filtering
  function applyFilters() {
    let filtered = GAMES;
    if (activeCategory !== "All") {
      filtered = filtered.filter(g => g.category === activeCategory);
    }
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      filtered = filtered.filter(g =>
        g.title.toLowerCase().includes(q) ||
        g.category.toLowerCase().includes(q)
      );
    }
    renderGames(filtered);
  }

  // Render Recently Played section
  function renderRecentlyPlayed() {
    try {
      const recent = JSON.parse(localStorage.getItem("recentlyPlayed") || "[]");
      if (recent.length === 0) {
        recentlyPlayedSection.style.display = "none";
        return;
      }
      recentlyPlayedSection.style.display = "block";
      recentlyPlayedGrid.innerHTML = "";
      recent.forEach(g => recentlyPlayedGrid.appendChild(buildCard(g)));
    } catch (e) {
      recentlyPlayedSection.style.display = "none";
    }
  }

  // Search handler
  searchInput.addEventListener("input", (e) => {
    searchQuery = e.target.value.trim();
    applyFilters();
  });

  // Handle incoming search from game page
  const urlParams = new URLSearchParams(window.location.search);
  const incomingSearch = urlParams.get("search");
  if (incomingSearch) {
    searchInput.value = incomingSearch;
    searchQuery = incomingSearch;
  }

  // Boot
  renderCategoryTabs();
  renderRecentlyPlayed();
  applyFilters();
</script>
